name: Build, Scan and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du repo
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # 2. Génère un tag basé sur le numéro de commit court
      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # 3. Build l'image (sans la pousser pour l'instant)
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:${{ steps.vars.outputs.tag }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:${{ steps.vars.outputs.tag }} ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:latest

      # 4. Scan de sécurité avec Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "docker://${{ secrets.DOCKERHUB_USERNAME }}/mon-app:${{ steps.vars.outputs.tag }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      # 5. Connexion à Docker Hub
      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Push de l'image (seulement si le scan est passé)
      - name: Push Docker image
        if: success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:${{ steps.vars.outputs.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mon-app:latest
